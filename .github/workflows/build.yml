name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows App (flet build windows)
    runs-on: windows-latest  # Has Visual Studio + C++ tools pre-installed

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Read Version
        id: version
        shell: pwsh
        run: |
          $version = python -c "from version import __version__; print(__version__)"
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Build with flet pack
        shell: pwsh
        run: |
          python build.py
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Build failed!"
            exit 1
          }

      - name: Locate build output
        id: locate
        shell: pwsh
        run: |
          $buildDir = "dist"
          if (Test-Path "$buildDir\StreamGuard.exe") {
            echo "BUILD_DIR=$buildDir" >> $env:GITHUB_OUTPUT
            echo "Found build at: $buildDir\StreamGuard.exe"
          } else {
            Get-ChildItem dist -Recurse -Filter "*.exe" | Select-Object FullName
          }

      - name: Zip the Windows Build
        shell: pwsh
        run: |
          $src = "dist\StreamGuard.exe"
          $zip = "StreamGuard-v${{ steps.version.outputs.VERSION }}-Windows-x64.zip"
          Compress-Archive -Path $src -DestinationPath $zip
          Write-Host "Created: $zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: StreamGuard v${{ steps.version.outputs.VERSION }}
          body_path: CHANGELOG.md
          files: StreamGuard-v${{ steps.version.outputs.VERSION }}-Windows-x64.zip
          draft: false
          prerelease: false

      - name: Upload Build Artifact (manual runs)
        uses: actions/upload-artifact@v4
        if: github.event_name == 'workflow_dispatch'
        with:
          name: StreamGuard-Windows-x64
          path: dist/StreamGuard.exe
          retention-days: 7
