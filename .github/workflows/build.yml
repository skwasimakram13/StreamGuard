name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows App (flet build windows)
    runs-on: windows-latest  # Has Visual Studio + C++ tools pre-installed

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Read Version
        id: version
        shell: pwsh
        run: |
          $version = python -c "from version import __version__; print(__version__)"
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Build Windows App (Native Flet)
        shell: pwsh
        run: |
          python build.py
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Build failed!"
            exit 1
          }

      - name: Compile Inno Setup Installer
        shell: pwsh
        run: |
          iscc installer.iss
          if ($LASTEXITCODE -ne 0) {
            Write-Host "InnoSetup compilation failed!"
            exit 1
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: StreamGuard v${{ steps.version.outputs.VERSION }}
          body_path: CHANGELOG.md
          files: InnoSetupOutput/StreamGuard_Setup_*.exe
          draft: false
          prerelease: false

      - name: Upload Installer Artifact (manual runs)
        uses: actions/upload-artifact@v4
        if: github.event_name == 'workflow_dispatch'
        with:
          name: StreamGuard-Windows-Installer
          path: InnoSetupOutput/StreamGuard_Setup_*.exe
          retention-days: 7
