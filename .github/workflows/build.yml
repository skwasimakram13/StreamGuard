name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Read Version
        id: version
        run: |
          $version = python -c "from version import __version__; print(__version__)"
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Build with PyInstaller
        run: python build.py

      - name: Zip the Build Output
        run: |
          Compress-Archive -Path dist\StreamGuard\* -DestinationPath StreamGuard-v${{ steps.version.outputs.VERSION }}-Windows-x64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: StreamGuard v${{ steps.version.outputs.VERSION }}
          body_path: CHANGELOG.md
          files: |
            StreamGuard-v${{ steps.version.outputs.VERSION }}-Windows-x64.zip
          draft: false
          prerelease: false

      - name: Upload Build Artifact (for manual runs)
        uses: actions/upload-artifact@v4
        if: github.event_name == 'workflow_dispatch'
        with:
          name: StreamGuard-Windows-x64
          path: dist/StreamGuard/
          retention-days: 7
