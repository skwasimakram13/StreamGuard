name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows App (flet build windows)
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Read Version
        id: version
        shell: pwsh
        run: |
          $version = python -c "from version import __version__; print(__version__)"
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Build Windows App (Native Flet)
        shell: pwsh
        env:
          PYTHONUTF8: "1"
          FLET_CLI_NO_RICH_OUTPUT: "1"
        run: |
          $version = python -c "from version import __version__; print(__version__)"
          flet build windows `
            --project StreamGuard `
            --product StreamGuard `
            --org com.streamguard `
            --company "StreamGuard Tools" `
            --build-version $version `
            --yes
          if ($LASTEXITCODE -ne 0) {
            Write-Error "flet build windows failed!"
            exit 1
          }

      - name: Find and Verify Build Output
        shell: pwsh
        run: |
          Write-Host "=== Searching entire workspace for StreamGuard.exe ==="
          $allExes = Get-ChildItem -Path "." -Filter "StreamGuard.exe" -Recurse -ErrorAction SilentlyContinue
          if ($allExes) {
            foreach ($f in $allExes) { Write-Host "Found: $($f.FullName)" }
          } else {
            Write-Host "StreamGuard.exe NOT found — listing all .exe files:"
            Get-ChildItem -Path "." -Filter "*.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object FullName
          }

          Write-Host "=== Top-level build directory ==="
          Get-ChildItem -Path "build" -Recurse -Depth 4 -ErrorAction SilentlyContinue | Select-Object FullName

          $exePath = Get-ChildItem -Path "." -Filter "StreamGuard.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $exePath) {
            Write-Error "StreamGuard.exe not found anywhere — build likely failed silently."
            exit 1
          }
          $releaseDir = $exePath.DirectoryName
          Write-Host "Release directory: $releaseDir"
          echo "RELEASE_DIR=$releaseDir" >> $env:GITHUB_ENV

      - name: Compile Inno Setup Installer
        shell: pwsh
        run: |
          iscc /DReleaseDir="$env:RELEASE_DIR" installer.iss
          if ($LASTEXITCODE -ne 0) {
            Write-Host "InnoSetup compilation failed!"
            exit 1
          }
          Write-Host "=== InnoSetupOutput ==="
          Get-ChildItem -Path "InnoSetupOutput" -ErrorAction SilentlyContinue

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: StreamGuard v${{ steps.version.outputs.VERSION }}
          body_path: CHANGELOG.md
          files: InnoSetupOutput/StreamGuard_Setup_*.exe
          draft: false
          prerelease: false

      - name: Upload Installer Artifact (manual runs)
        uses: actions/upload-artifact@v4
        if: github.event_name == 'workflow_dispatch'
        with:
          name: StreamGuard-Windows-Installer
          path: InnoSetupOutput/StreamGuard_Setup_*.exe
          retention-days: 7
